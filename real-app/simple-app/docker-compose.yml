version: '3.8'

services:
  backend:
    build: ./backend
    container_name: backend-app
    # No port mapping needed - only frontend container talks to it via internal network
    # Uncomment below if you want to access backend directly for debugging
    # ports:
    #   - "5000:5000"
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend-app
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
